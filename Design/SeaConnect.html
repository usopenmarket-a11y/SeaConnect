<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SeaConnect · سي كونكت</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" type="module"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="detail.jsx"></script>
  <script type="text/babel" src="booking.jsx"></script>
  <script type="text/babel" src="altpages.jsx"></script>
  <script type="text/babel" src="dashboards.jsx"></script>
  <script type="text/babel" src="availability.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAKS = /*EDITMODE-BEGIN*/{
      "density": "cozy"
    }/*EDITMODE-END*/;

    function App() {
      const [page, setPage] = useState(() => localStorage.getItem('sc-page') || 'home');
      const [boat, setBoat] = useState(() => {
        const id = localStorage.getItem('sc-boat');
        return id ? BOATS.find(b => b.id === id) || BOATS[0] : BOATS[0];
      });
      const [density, setDensity] = useState(TWEAKS.density);
      const [role, setRole] = useState(() => localStorage.getItem('sc-role') || 'customer');
      useEffect(() => { localStorage.setItem('sc-role', role); }, [role]);

      useEffect(() => { localStorage.setItem('sc-page', page); window.scrollTo({ top: 0 }); }, [page]);
      useEffect(() => { if (boat) localStorage.setItem('sc-boat', boat.id); }, [boat]);
      useEffect(() => { document.documentElement.setAttribute('data-density', density); }, [density]);

      const openBoat = (b) => { setBoat(b); setPage('detail'); };
      const nav = (id) => setPage(id);

      if (role === 'admin') {
        return (
          <div className="app-shell" data-screen-label="09 Admin dashboard">
            <AdminDash />
            <RoleSwitcher role={role} setRole={setRole} />
            <TweaksPanel density={density} setDensity={setDensity} />
          </div>
        );
      }
      if (role === 'seller') {
        return (
          <div className="app-shell" data-screen-label="10 Seller dashboard">
            <SellerDash />
            <RoleSwitcher role={role} setRole={setRole} />
            <TweaksPanel density={density} setDensity={setDensity} />
          </div>
        );
      }

      return (
        <div className="app-shell" data-screen-label={
          page === 'home' ? '01 Home' :
          page === 'boats' ? '02 Boats' :
          page === 'detail' ? '03 Boat detail' :
          page === 'book' ? '04 Booking flow' :
          page === 'confirm' ? '05 Confirmation' :
          page === 'market' ? '06 Marketplace' :
          page === 'comps' ? '07 Competitions' :
          page === 'profile' ? '08 Profile' : page
        }>
          <TopStrip />
          <Nav currentPage={page} onNavigate={nav} />

          {page === 'home' && <Home onNavigate={nav} onOpenBoat={openBoat} />}
          {page === 'boats' && <BoatsPage onOpenBoat={openBoat} />}
          {page === 'detail' && <BoatDetail boat={boat} onBook={(b) => { setBoat(b); setPage('book'); }} onNavigate={nav} />}
          {page === 'book' && <BookingFlow boat={boat} onBack={() => setPage('detail')} onConfirm={() => setPage('confirm')} />}
          {page === 'confirm' && <Confirmation boat={boat} onHome={() => setPage('home')} />}
          {page === 'market' && <Marketplace onNavigate={nav} />}
          {page === 'comps' && <CompsPage />}
          {page === 'profile' && <Profile onNavigate={nav} onOpenBoat={openBoat} />}

          <Footer />
          <RoleSwitcher role={role} setRole={setRole} />
          <TweaksPanel density={density} setDensity={setDensity} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
