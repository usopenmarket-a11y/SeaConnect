services:

  # ── PostgreSQL 16 with pgvector ───────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: seaconnect_dev
      POSTGRES_USER: sc_user
      POSTGRES_PASSWORD: localpassword
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sc_user -d seaconnect_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Django API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8010:8000"
    env_file: .env.dev
    environment:
      DJANGO_SUPERUSER_EMAIL: admin@seaconnect.local
      DJANGO_SUPERUSER_PASSWORD: admin123
      # Override CORS to allow the new host port
      CORS_ALLOWED_ORIGINS: "http://localhost:3010,http://localhost:3011"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - jwt_keys:/app/keys
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped

  # ── Celery worker ─────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info -c 2
    env_file: .env.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./backend:/app
      - jwt_keys:/app/keys
    restart: unless-stopped

  # ── Celery Beat scheduler ─────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./backend:/app
      - jwt_keys:/app/keys
    restart: unless-stopped

  # ── Next.js web (customer-facing) ────────────────────────────────────────
  # NEXT_PUBLIC_API_URL points to the host-side port so the browser can reach
  # the API directly. Inside the container, server-side fetches use the Docker
  # network name (http://api:8000) which is set via API_INTERNAL_URL.
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3010:3000"
    environment:
      # Browser-side (injected at build time by Next.js — points to host port)
      NEXT_PUBLIC_API_URL: "http://localhost:8010"
      # Server-side fetches inside Docker use the internal network
      API_INTERNAL_URL: "http://api:8000"
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./web:/app
      # Named volumes prevent host node_modules / .next from leaking in
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    command: npm run dev
    restart: unless-stopped

  # ── Next.js admin portal ──────────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3011:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8010"
      API_INTERNAL_URL: "http://api:8000"
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
      - admin_next_cache:/app/.next
    profiles:
      - admin
    restart: unless-stopped

  # ── MinIO (S3-compatible local storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Mailpit (email catcher) ───────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1026:1025"   # SMTP
      - "8026:8025"   # Web UI
    restart: unless-stopped

  # ── pgAdmin ───────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

  # ── Ollama (local LLM) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_dev_data:
  minio_data:
  pgadmin_data:
  ollama_data:
  jwt_keys:
  web_node_modules:
  web_next_cache:
  admin_node_modules:
  admin_next_cache:
